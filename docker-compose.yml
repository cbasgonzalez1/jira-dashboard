services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: jira-dashboard-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - JIRA_BASE_URL=https://jira.aes.alcatel.fr:8443
      - JIRA_USER=GONZALD7
      # JIRA_PASSWORD must be set in .env — never hardcode here
    volumes:
      - ./api:/app
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jira-dashboard-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    restart: unless-stopped
