<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Jira Dashboard{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --orange: #e3693a;
      --purple: #bc8cff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 20px 20px;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sidebar-logo span { color: var(--text-muted); font-weight: 400; font-size: 12px; display: block; }
    .nav-item {
      display: block;
      padding: 9px 20px;
      color: var(--text-muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
    .nav-label {
      padding: 16px 20px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* Main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px 32px;
    }

    /* Page header */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 600; }
    .page-header p { color: var(--text-muted); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* KPI grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
    }
    .kpi-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 700; }
    .kpi-value.green { color: var(--green); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-value.accent { color: var(--accent); }
    .kpi-value.purple { color: var(--purple); }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 900px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Chart containers */
    .chart-container { position: relative; height: 280px; }
    .chart-container-tall { position: relative; height: 360px; }

    /* Project selector */
    .project-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .proj-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .proj-btn:hover { border-color: var(--accent); color: var(--accent); }
    .proj-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-blue { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-purple { background: rgba(188,140,255,0.15); color: var(--purple); }

    /* Progress bar */
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s; }
    .progress-fill.yellow { background: var(--yellow); }
    .progress-fill.red { background: var(--red); }

    /* Sprint completion */
    .sprint-pct { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      Jira Dashboard
      <span>Local Dev Environment</span>
    </div>
    <div class="nav-label">Dashboards</div>
    <a href="/dashboard/overview" class="nav-item {% if active_nav == 'overview' %}active{% endif %}">Overview</a>
    <a href="/dashboard/velocity" class="nav-item {% if active_nav == 'velocity' %}active{% endif %}">Velocity</a>
    <a href="/dashboard/burndown" class="nav-item {% if active_nav == 'burndown' %}active{% endif %}">Burndown</a>
    <a href="/dashboard/backlog" class="nav-item {% if active_nav == 'backlog' %}active{% endif %}">Backlog</a>
    <a href="/dashboard/team" class="nav-item {% if active_nav == 'team' %}active{% endif %}">Team Load</a>
    <div class="nav-label">Links</div>
    <a href="http://localhost:8080" target="_blank" class="nav-item">Jira ↗</a>
    <a href="/docs" target="_blank" class="nav-item">API Docs ↗</a>
  </nav>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
